services:
  # Interactive mode: live progress bars, press q to cancel.
  # Usage: docker compose run --rm transcodeqa
  transcodeqa:
    image: ghcr.io/jordfoz16/transcodeqa:latest
    tty: true
    stdin_open: true
    volumes:
      - ./samples:/input:ro
      - /transcode:/transcode:ro
    command:
      - /input/base.mkv
      - /input/transcoded/codec/
    # Override source/transcoded paths or add --jobs 1 for single-threaded:
    # command: ["/input/your_source.mkv", "/input/your_transcoded/"]

  # Unattended mode: runs in the background, writes results to a file.
  # Usage: docker compose run --rm transcodeqa-batch
  transcodeqa-batch:
    image: ghcr.io/jordfoz16/transcodeqa:latest
    volumes:
      - ./samples:/input:ro
      - ./output:/output
      - /transcode:/transcode:ro
    command:
      - /input/base.mkv
      - /input/transcoded/codec/
      - --output
      - /output/results.txt
